<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} | Infrastructure KB</title>

<!-- Google Analytics -->
{% include analytics.html %}
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FTC32Q1G9P"></script>

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7820111223266181"
crossorigin="anonymous"></script>

<style>

/* Base */
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  color:#333;
}

/* Main Content */
.main {
  width:100%;
}

/* Header */
header {
  background:#0e75b6;
  color:white;
  padding:1.5rem;
  text-align:center;
}

header h1 {
  color: white;
}

/* Content box */
section {
  max-width:900px;
  margin:2rem auto;
  padding:2rem;
  background:white;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Headings */
h1, h2, h3 {
  color:#0e75b6;
}

/* Tables */
table {
  width:100%;
  border-collapse: collapse;
  margin-top:1rem;
}

th, td {
  border:1px solid #ddd;
  padding:10px;
  text-align:left;
}

th {
  background:#0e75b6;
  color:white;
}

tr:nth-child(even) {
  background:#f9f9f9;
}

/* Code */
code {
  background:#eee;
  padding:3px 6px;
  border-radius:4px;
  font-size:0.9em;
}

/* Links */
a {
  color:#0e75b6;
  text-decoration:none;
}

a:hover {
  text-decoration:underline;
}

/* Buttons */
a.button {
  display:inline-block;
  margin-bottom:1rem;
  padding:0.5rem 1rem;
  background:#0e75b6;
  color:white;
  border-radius:5px;
}

a.button:hover {
  background:#095494;
}

/* 📱 Mobile Responsive */
@media (max-width: 768px) {

  header {
    padding:1rem;
  }

  header h1 {
    font-size:20px;
  }

  section {
    margin:1rem;
    padding:1rem;
  }

  table {
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }

}

</style>

</head>

<body>

<div class="main">

<header>
  <h1>Infrastructure Knowledge Base</h1>
</header>

<section>

{% unless page.name == "index.md" %}
  <a href="/infrastructure-kb/" class="button">⬅ Back to Infrastructure KB</a> 
{% endunless %}

{{ content }}

</section>

</div>

</body>
</html>
