<style>
/* Base */
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  color:#333;
  display:flex;
}

/* Sidebar */
.sidebar {
  width:250px;
  background:#0e75b6;
  color:white;
  height:100vh;
  position:fixed;
  padding:20px;
  overflow:auto;
}

.sidebar h2 {
  margin-top:0;
}

.sidebar a {
  display:block;
  color:white;
  text-decoration:none;
  margin:8px 0;
}

.sidebar a:hover {
  text-decoration:underline;
}

/* Main Content */
.main {
  margin-left:250px;
  width:100%;
}

/* Header */
header {
  background:#0e75b6;
  color:white;
  padding:1.5rem;
  text-align:center;
}

/* Content box */
section {
  max-width:900px;
  margin:2rem auto;
  padding:2rem;
  background:white;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Headings */
h1, h2, h3 {
  color:#0e75b6;
}

  /* Fix header title */
  header h1 {
  color: white;
}
/* Tables */
table {
  width:100%;
  border-collapse: collapse;
  margin-top:1rem;
}

th, td {
  border:1px solid #ddd;
  padding:10px;
  text-align:left;
}

th {
  background:#0e75b6;
  color:white;
}

tr:nth-child(even) {
  background:#f9f9f9;
}

/* Code */
code {
  background:#eee;
  padding:3px 6px;
  border-radius:4px;
  font-size:0.9em;
}

/* Links */
a {
  color:#0e75b6;
  text-decoration:none;
}

a:hover {
  text-decoration:underline;
}

/* Buttons */
a.button {
  display:inline-block;
  margin:0.5rem 0.5rem 0 0;
  padding:0.5rem 1rem;
  background:#0e75b6;
  color:white;
  border-radius:5px;
}

a.button:hover {
  background:#095494;
}
</style>

</head>
